<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 400px; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 48px; color: #10b981; }
        .logo h1 { font-size: 28px; color: #10b981; margin-top: 10px; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 5px; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; font-size: 14px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; display: block; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; display: block; }
        .message.info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; display: block; }
        .message.warning { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; display: block; }
        .forgot-password { text-align: right; margin-top: 8px; }
        .forgot-password a { color: #6b7280; text-decoration: none; font-size: 13px; }
        .forgot-password a:hover { color: #10b981; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .home-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        .home-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .home-link a:hover { color: #10b981; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .version-badge { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
        .clear-session-btn { margin-top: 15px; text-align: center; }
        .clear-session-btn button { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; }
        .clear-session-btn button:hover { color: #dc2626; }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .remember-me input { width: auto; padding: 0; margin: 0; }
        .remember-me label { margin: 0; font-size: 14px; color: #6b7280; cursor: pointer; }
        .alert-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-banner i { color: #f59e0b; margin-right: 8px; }
        .referral-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>VELOXTRADES</h1>
                <p>The Velocity of Wealth</p>
            </div>
            <div id="referralBadge" style="display: none;" class="referral-badge">
                <i class="fas fa-gift"></i>
                <span id="referralMessage">You were referred! Get bonus on signup!</span>
            </div>
            <h2>Welcome Back</h2>
            <div class="subtitle">Sign in to your account</div>
            
            <div id="alertBanner" class="alert-banner">
                <i class="fas fa-info-circle"></i>
                <span id="alertMessage"></span>
            </div>
            
            <div id="message" class="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username or Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="Enter your username or email" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="link">
                Don't have an account? <a href="register.html" id="registerLink">Create account</a>
            </div>
            
            <div class="home-link">
                <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
            </div>
            
            <div class="clear-session-btn">
                <button id="clearSessionBtn" type="button">Clear saved session</button>
            </div>
            <div class="version-badge">
                Version 3.2.0 - Referral Ready
            </div>
        </div>
    </div>

    <script>
    const API_BASE_URL = 'https://investment-gto3.onrender.com';
    let autoRedirectInProgress = false;
    let referralCodeFromUrl = null;

    // Function to get token from any storage
    function getToken() {
        let token = sessionStorage.getItem('veloxtrades_token');
        if (!token) token = localStorage.getItem('veloxtrades_token');
        if (!token) {
            const match = document.cookie.match(/veloxtrades_token=([^;]+)/);
            if (match) token = match[1];
        }
        return token;
    }
    
    // Clear all session data
    function clearAllSession() {
        localStorage.removeItem('veloxtrades_token');
        localStorage.removeItem('veloxtrades_user');
        localStorage.removeItem('veloxtrades_remembered');
        localStorage.removeItem('saved_username');
        sessionStorage.removeItem('veloxtrades_token');
        sessionStorage.removeItem('veloxtrades_user');
        document.cookie = 'veloxtrades_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        document.cookie = 'elite_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        console.log('✅ All session data cleared');
    }
    
    // Get URL parameters
    function getUrlParameter(name) {
        name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
        var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }
    
    // Check if coming from logout or registration
    function checkUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Check for logout success
        if (urlParams.get('logout') === 'success') {
            showMessage('You have been logged out successfully', 'success');
            const newUrl = window.location.pathname;
            window.history.replaceState({}, document.title, newUrl);
            return true;
        }
        
        // Check for registration success
        if (urlParams.get('registered') === 'true') {
            showAlert('Registration successful! Please login with your credentials.', 'success');
            const newUrl = window.location.pathname;
            window.history.replaceState({}, document.title, newUrl);
            return true;
        }
        
        return false;
    }
    
    // Check for referral code in URL
    function checkReferralCode() {
        const refCode = getUrlParameter('ref');
        if (refCode && refCode.trim()) {
            referralCodeFromUrl = refCode.toUpperCase();
            console.log('🔗 Referral code found in URL:', referralCodeFromUrl);
            
            // Show referral badge
            const badge = document.getElementById('referralBadge');
            const badgeMessage = document.getElementById('referralMessage');
            badgeMessage.innerHTML = `<i class="fas fa-gift"></i> You were referred by code: ${referralCodeFromUrl}! Get bonus on signup!`;
            badge.style.display = 'inline-flex';
            
            // Update register link with referral code
            const registerLink = document.getElementById('registerLink');
            if (registerLink) {
                registerLink.href = `register.html?ref=${referralCodeFromUrl}`;
            }
            
            // Store referral code in session to use on registration
            sessionStorage.setItem('pending_referral_code', referralCodeFromUrl);
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                badge.style.display = 'none';
            }, 8000);
        }
        
        // Check for referral code in session (from previous visit)
        const storedRefCode = sessionStorage.getItem('pending_referral_code');
        if (storedRefCode && !referralCodeFromUrl) {
            referralCodeFromUrl = storedRefCode;
            const registerLink = document.getElementById('registerLink');
            if (registerLink) {
                registerLink.href = `register.html?ref=${storedRefCode}`;
            }
        }
    }
    
    function showAlert(message, type = 'info') {
        const alertBanner = document.getElementById('alertBanner');
        const alertMessage = document.getElementById('alertMessage');
        
        // Check if message contains HTML (like a link)
        if (message.includes('<a')) {
            alertMessage.innerHTML = message;
        } else {
            alertMessage.textContent = message;
        }
        
        alertBanner.style.display = 'block';
        
        if (type === 'success') {
            alertBanner.style.background = '#d1fae5';
            alertBanner.style.borderLeftColor = '#10b981';
            alertBanner.querySelector('i').style.color = '#10b981';
        } else if (type === 'error') {
            alertBanner.style.background = '#fee2e2';
            alertBanner.style.borderLeftColor = '#ef4444';
            alertBanner.querySelector('i').style.color = '#ef4444';
        } else {
            alertBanner.style.background = '#fef3c7';
            alertBanner.style.borderLeftColor = '#f59e0b';
            alertBanner.querySelector('i').style.color = '#f59e0b';
        }
        
        setTimeout(() => {
            alertBanner.style.display = 'none';
        }, 5000);
    }
    
    function showMessage(text, type = 'error') {
        const messageDiv = document.getElementById('message');
        messageDiv.className = `message ${type}`;
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            info: 'fa-info-circle',
            warning: 'fa-exclamation-triangle'
        };
        messageDiv.innerHTML = `<i class="fas ${icons[type] || 'fa-info-circle'}"></i> ${text}`;
        messageDiv.style.display = 'block';
        
        if (type === 'success') {
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    }
    
    function setLoading(isLoading) {
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.disabled = isLoading;
        if (isLoading) {
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
        } else {
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        }
    }
    
    async function handleLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const rememberMe = document.getElementById('rememberMe').checked;
        
        if (!username || !password) {
            showMessage('Please enter both username and password', 'error');
            return;
        }
        
        setLoading(true);
        showMessage('Authenticating...', 'info');
        
        try {
            const response = await fetch(`${API_BASE_URL}/api/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ username, password }),
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.message || 'Login failed');
            }
            
            let token = null;
            let user = null;
            
            if (data.success && data.data?.token) {
                token = data.data.token;
                user = data.data.user;
            } else if (data.token) {
                token = data.token;
                user = data.user;
            }
            
            if (!token || !user) {
                throw new Error('Invalid response from server');
            }
            
            // Store token
            if (rememberMe) {
                localStorage.setItem('veloxtrades_token', token);
                localStorage.setItem('saved_username', username);
                sessionStorage.removeItem('veloxtrades_token');
            } else {
                sessionStorage.setItem('veloxtrades_token', token);
                localStorage.removeItem('veloxtrades_token');
                localStorage.removeItem('saved_username');
            }
            
            // Store user info
            localStorage.setItem('veloxtrades_user', JSON.stringify(user));
            sessionStorage.setItem('veloxtrades_user', JSON.stringify(user));
            
            // Remove logout flag if exists
            sessionStorage.removeItem('just_logged_out');
            
            // Clear pending referral code if exists
            sessionStorage.removeItem('pending_referral_code');
            
            // Set cookie
            const expires = new Date();
            expires.setTime(expires.getTime() + (rememberMe ? 30 : 1) * 24 * 60 * 60 * 1000);
            document.cookie = `veloxtrades_token=${token}; path=/; expires=${expires.toUTCString()}; SameSite=Lax`;
            
            const isAdmin = user.is_admin === true;
            const redirectPage = isAdmin ? 'admin-dashboard.html' : 'dashboard.html';
            
            showMessage(`Login successful! Redirecting to ${isAdmin ? 'Admin Dashboard' : 'Dashboard'}...`, 'success');
            
            setTimeout(() => {
                window.location.href = redirectPage;
            }, 1500);
            
        } catch (error) {
            console.error('Login error:', error);
            showMessage(error.message || 'Login failed. Please check your credentials.', 'error');
            setLoading(false);
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }
    
    function clearSession() {
        if (confirm('⚠️ Clear all saved session data? You will be logged out.')) {
            clearAllSession();
            sessionStorage.setItem('just_logged_out', 'true');
            sessionStorage.removeItem('pending_referral_code');
            showMessage('Session cleared! You can now login again.', 'success');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('rememberMe').checked = false;
            
            setTimeout(() => {
                const messageDiv = document.getElementById('message');
                messageDiv.style.display = 'none';
            }, 2000);
        }
    }
    
    // Load saved username
    function loadSavedUsername() {
        const savedUsername = localStorage.getItem('saved_username');
        if (savedUsername) {
            document.getElementById('username').value = savedUsername;
            document.getElementById('rememberMe').checked = true;
        }
    }
    
    // Check if user is already logged in - but DON'T auto-redirect
    async function checkExistingSession() {
        const token = getToken();
        if (!token) return false;
        
        // Check if we have a logout flag
        const justLoggedOut = sessionStorage.getItem('just_logged_out');
        if (justLoggedOut === 'true') {
            sessionStorage.removeItem('just_logged_out');
            return false;
        }
        
        try {
            const response = await fetch(`${API_BASE_URL}/api/verify-token`, {
                headers: { 'Authorization': `Bearer ${token}` },
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if (data.success && data.user) {
                const isAdmin = data.user.is_admin === true;
                const redirectPage = isAdmin ? 'admin-dashboard.html' : 'dashboard.html';
                
                // Show a banner instead of auto-redirecting
                showAlert(`✅ You are already logged in as <strong>${data.user.username}</strong>. <a href="${redirectPage}" style="color: #10b981; font-weight: bold; text-decoration: underline;">Click here to go to Dashboard</a>`, 'success');
                return true;
            } else {
                // Token invalid, clear it
                clearAllSession();
                return false;
            }
        } catch (error) {
            console.log('Token verification failed:', error);
            clearAllSession();
            return false;
        }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('📄 Login page loaded - Version 3.2.0 with Referral Support');
        
        // Check URL parameters for messages
        checkUrlParams();
        
        // Check for referral code in URL
        checkReferralCode();
        
        // Check for existing session but don't auto-redirect
        await checkExistingSession();
        
        // Load saved username
        loadSavedUsername();
        
        // Set up event listeners
        const loginForm = document.getElementById('loginForm');
        const clearSessionBtn = document.getElementById('clearSessionBtn');
        const passwordInput = document.getElementById('password');
        
        loginForm.addEventListener('submit', handleLogin);
        clearSessionBtn.addEventListener('click', clearSession);
        
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginBtn = document.getElementById('loginBtn');
                if (!loginBtn.disabled) {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            }
        });
        
        // Focus on username field
        if (!document.getElementById('username').value) {
            document.getElementById('username').focus();
        } else {
            document.getElementById('password').focus();
        }
        
        // Log referral code if present
        if (referralCodeFromUrl) {
            console.log('🎁 Referral tracking active. Code:', referralCodeFromUrl);
        }
    });
    </script>
</body>
</html>
