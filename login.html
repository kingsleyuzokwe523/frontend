<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 400px; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 48px; color: #10b981; }
        .logo h1 { font-size: 28px; color: #10b981; margin-top: 10px; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 5px; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; font-size: 14px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; display: block; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; display: block; }
        .message.info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; display: block; }
        .forgot-password { text-align: right; margin-top: 8px; }
        .forgot-password a { color: #6b7280; text-decoration: none; font-size: 13px; }
        .forgot-password a:hover { color: #10b981; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .home-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        .home-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }
        .home-link a:hover {
            color: #10b981;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .version-badge { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
        .clear-session-btn { margin-top: 15px; text-align: center; }
        .clear-session-btn button { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; transition: color 0.3s; }
        .clear-session-btn button:hover { color: #dc2626; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>VELOXTRADES</h1>
                <p>The Velocity of Wealth</p>
            </div>
            <h2>Welcome Back</h2>
            <div class="subtitle">Sign in to your account</div>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username or Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="Enter your username or email" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="link">
                Don't have an account? <a href="register.html">Create account</a>
            </div>
            
            <div class="home-link">
                <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
            </div>
            
            <div class="clear-session-btn">
                <button id="clearSessionBtn" type="button">Clear saved session</button>
            </div>
            <div class="version-badge">
                Version 2.1.7
            </div>
        </div>
    </div>

    <script>
    // ============================================
    // VELOXTRADES CONFIGURATION
    // ============================================
    
    const Veloxtrades = {
        API_BASE_URL: 'https://investment-gto3.onrender.com',
        VERSION: '2.1.7',

        getToken: function() {
            const cookieMatch = document.cookie.match(/veloxtrades_token=([^;]+)/);
            if (cookieMatch) return cookieMatch[1];
            return localStorage.getItem('veloxtrades_token') || sessionStorage.getItem('veloxtrades_token');
        },

        setToken: function(token) {
            const maxAge = 30 * 24 * 60 * 60;
            document.cookie = `veloxtrades_token=${token}; path=/; max-age=${maxAge}; secure; samesite=Lax`;
            localStorage.setItem('veloxtrades_token', token);
            sessionStorage.setItem('veloxtrades_token', token);
            console.log('✅ Token saved');
        },

        clearToken: function() {
            document.cookie = 'veloxtrades_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            localStorage.removeItem('veloxtrades_token');
            localStorage.removeItem('veloxtrades_user');
            sessionStorage.removeItem('veloxtrades_token');
            sessionStorage.removeItem('veloxtrades_user');
            console.log('🗑️ Token cleared');
        },

        async login(username, password) {
            try {
                console.log('🔐 Logging in:', username);
                
                const response = await fetch(`${this.API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                    mode: 'cors'
                });
                
                console.log(`📡 Login response status: ${response.status}`);
                
                const data = await response.json();
                console.log('📦 Login response:', data);
                
                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }
                
                if (data.success && data.data?.token) {
                    this.setToken(data.data.token);
                    if (data.data.user) {
                        localStorage.setItem('veloxtrades_user', JSON.stringify(data.data.user));
                    }
                    return { success: true, data: data.data };
                }
                
                if (data.token) {
                    this.setToken(data.token);
                    if (data.user) {
                        localStorage.setItem('veloxtrades_user', JSON.stringify(data.user));
                    }
                    return { success: true, data: { token: data.token, user: data.user } };
                }
                
                return { success: false, message: data.message || 'Login failed' };
                
            } catch (error) {
                console.error('❌ Login error:', error.message);
                return { success: false, message: error.message };
            }
        },

        async testConnection() {
            try {
                const response = await fetch(`${this.API_BASE_URL}/health`, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                console.log('✅ Backend connected:', data);
                return true;
            } catch (error) {
                console.log('⚠️ Backend connection:', error.message);
                return false;
            }
        }
    };

    window.Veloxtrades = Veloxtrades;

    // ============================================
    // LOGIN PAGE CODE
    // ============================================
    
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const clearSessionBtn = document.getElementById('clearSessionBtn');
        
        console.log('📄 Login page loaded - Version 2.1.7');
        console.log('🔧 Backend API URL:', Veloxtrades.API_BASE_URL);
        
        function showMessage(text, type = 'error') {
            messageDiv.className = `message ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            messageDiv.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            messageDiv.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
            }
        }
        
        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            loginBtn.innerHTML = isLoading ? '<span class="loading-spinner"></span> Logging in...' : '<i class="fas fa-sign-in-alt"></i> Login';
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                showMessage('Please enter both username and password', 'error');
                return;
            }
            
            setLoading(true);
            showMessage('Authenticating...', 'info');
            
            try {
                const result = await Veloxtrades.login(username, password);
                
                if (result.success && result.data) {
                    const user = result.data.user;
                    const isAdmin = user && (user.is_admin === true || user.role === 'admin');
                    
                    showMessage('Login successful! Redirecting...', 'success');
                    console.log('✅ Login successful! User type:', isAdmin ? 'ADMIN' : 'USER');
                    
                    setTimeout(() => {
                        if (isAdmin) {
                            window.location.replace('admin-dashboard.html');
                        } else {
                            window.location.replace('dashboard.html');
                        }
                    }, 1000);
                } else {
                    const errorMsg = result.message || 'Invalid username or password';
                    showMessage(errorMsg, 'error');
                    setLoading(false);
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Connection error. Please try again.', 'error');
                setLoading(false);
            }
        }
        
        function clearSession() {
            Veloxtrades.clearToken();
            showMessage('Session cleared! Please login again.', 'success');
            usernameInput.value = '';
            passwordInput.value = '';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // Event listeners
        loginForm.addEventListener('submit', handleLogin);
        
        passwordInput.addEventListener('keypress', function(e) { 
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        if (clearSessionBtn) {
            clearSessionBtn.addEventListener('click', clearSession);
        }
        
        // Test connection (non-blocking)
        Veloxtrades.testConnection().catch(() => {});
    });
    </script>
</body>
</html>
