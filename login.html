<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 400px; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 48px; color: #10b981; }
        .logo h1 { font-size: 28px; color: #10b981; margin-top: 10px; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 5px; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; font-size: 14px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; display: block; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; display: block; }
        .message.info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; display: block; }
        .forgot-password { text-align: right; margin-top: 8px; }
        .forgot-password a { color: #6b7280; text-decoration: none; font-size: 13px; }
        .forgot-password a:hover { color: #10b981; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .home-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        .home-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .home-link a:hover { color: #10b981; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .version-badge { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
        .clear-session-btn { margin-top: 15px; text-align: center; }
        .clear-session-btn button { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .remember-me input { width: auto; padding: 0; margin: 0; }
        .remember-me label { margin: 0; font-size: 14px; color: #6b7280; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>VELOXTRADES</h1>
                <p>The Velocity of Wealth</p>
            </div>
            <h2>Welcome Back</h2>
            <div class="subtitle">Sign in to your account</div>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username or Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="Enter your username or email" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="link">
                Don't have an account? <a href="register.html">Create account</a>
            </div>
            
            
            <div class="link">
                <a href="index.html">Back to home</a>
            </div>
            
            <div class="clear-session-btn">
                <button id="clearSessionBtn" type="button">Clear saved session</button>
            </div>
            <div class="version-badge">
                Version 3.0.0
            </div>
        </div>
    </div>

    <script>
    // SIMPLE LOGIN PAGE - NO AUTO CHECKS, JUST LOGIN
    const Veloxtrades = {
        API_BASE_URL: 'https://investment-gto3.onrender.com',
        
        // Simple login function
        async login(username, password, rememberMe) {
            try {
                console.log('🔐 Logging in:', username);
                
                const response = await fetch(`${this.API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('📦 Response:', data);
                
                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }
                
                // Handle token storage
                let token = null;
                let user = null;
                
                if (data.success && data.data?.token) {
                    token = data.data.token;
                    user = data.data.user;
                } else if (data.token) {
                    token = data.token;
                    user = data.user;
                }
                
                if (token && user) {
                    // Save token and user
                    if (rememberMe) {
                        localStorage.setItem('veloxtrades_token', token);
                        localStorage.setItem('veloxtrades_user', JSON.stringify(user));
                        localStorage.setItem('saved_username', username);
                    } else {
                        sessionStorage.setItem('veloxtrades_token', token);
                        sessionStorage.setItem('veloxtrades_user', JSON.stringify(user));
                        localStorage.removeItem('saved_username');
                    }
                    return { success: true, user: user };
                }
                
                return { success: false, message: 'Invalid response from server' };
                
            } catch (error) {
                console.error('❌ Login error:', error);
                return { success: false, message: error.message };
            }
        },
        
        // Clear all data
        clearAll: function() {
            localStorage.removeItem('veloxtrades_token');
            localStorage.removeItem('veloxtrades_user');
            localStorage.removeItem('saved_username');
            sessionStorage.removeItem('veloxtrades_token');
            sessionStorage.removeItem('veloxtrades_user');
            console.log('✅ All data cleared');
        }
    };
    
    // PAGE INITIALIZATION
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const homeLink = document.getElementById('homeLink');
        const clearSessionBtn = document.getElementById('clearSessionBtn');
        
        console.log('📄 Login page loaded - Simple Version');
        
        // Load saved username if exists
        const savedUsername = localStorage.getItem('saved_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
            rememberMeCheckbox.checked = true;
        }
        
        function showMessage(text, type = 'error') {
            messageDiv.className = `message ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            messageDiv.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
        
        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            if (isLoading) {
                loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            } else {
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const rememberMe = rememberMeCheckbox.checked;
            
            if (!username || !password) {
                showMessage('Please enter both username and password', 'error');
                return;
            }
            
            setLoading(true);
            showMessage('Authenticating...', 'info');
            
            const result = await Veloxtrades.login(username, password, rememberMe);
            
            if (result.success) {
                const user = result.user;
                const isAdmin = user && (user.is_admin === true || user.role === 'admin');
                
                showMessage('Login successful! Redirecting...', 'success');
                console.log('✅ Login successful!');
                
                setTimeout(() => {
                    const targetPage = isAdmin ? 'admin-dashboard.html' : 'dashboard.html';
                    console.log('🚀 Redirecting to:', targetPage);
                    window.location.href = targetPage;
                }, 1000);
            } else {
                showMessage(result.message || 'Invalid username or password', 'error');
                setLoading(false);
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
        
        function clearSession() {
            if (confirm('Clear all saved session data? You will need to login again.')) {
                Veloxtrades.clearAll();
                showMessage('Session cleared!', 'success');
                usernameInput.value = '';
                passwordInput.value = '';
                rememberMeCheckbox.checked = false;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
            }
        }
        
        function handleHomeLink(e) {
            e.preventDefault();
            console.log('🏠 Going to home page');
            window.location.href = 'index.html';
        }
        
        // Event listeners
        loginForm.addEventListener('submit', handleLogin);
        homeLink.addEventListener('click', handleHomeLink);
        clearSessionBtn.addEventListener('click', clearSession);
        
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Focus on username
        usernameInput.focus();
    });
    </script>
</body>
</html>
