<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .login-container { width: 100%; max-width: 400px; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 48px; color: #10b981; }
        .logo h1 { font-size: 28px; color: #10b981; margin-top: 10px; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 5px; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; font-size: 14px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        input:disabled { background-color: #f3f4f6; cursor: not-allowed; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover:not(:disabled) { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; display: block; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; display: block; }
        .message.info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; display: block; }
        .message.warning { background: #fed7aa; color: #9b2c1d; border: 1px solid #f59e0b; display: block; }
        .forgot-password { text-align: right; margin-top: 8px; }
        .forgot-password a { color: #6b7280; text-decoration: none; font-size: 13px; }
        .forgot-password a:hover { color: #10b981; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .home-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        .home-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }
        .home-link a:hover {
            color: #10b981;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .version-badge { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
        .clear-session-btn { margin-top: 15px; text-align: center; }
        .clear-session-btn button { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; text-decoration: underline; transition: color 0.3s; }
        .clear-session-btn button:hover { color: #dc2626; }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .remember-me input {
            width: auto;
            padding: 0;
            margin: 0;
        }
        .remember-me label {
            margin: 0;
            font-size: 14px;
            font-weight: normal;
            color: #6b7280;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>VELOXTRADES</h1>
                <p>The Velocity of Wealth</p>
            </div>
            <h2>Welcome Back</h2>
            <div class="subtitle">Sign in to your account</div>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username or Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="Enter your username or email" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="link">
                Don't have an account? <a href="register.html">Create account</a>
            </div>
            
            <div class="home-link">
                <a href="index.html" id="homeLink"><i class="fas fa-home"></i> Back to Home</a>
            </div>
            
            <div class="clear-session-btn">
                <button id="clearSessionBtn" type="button">Clear saved session</button>
            </div>
            <div class="version-badge">
                Version 2.1.8
            </div>
        </div>
    </div>

    <script>
    // ============================================
    // VELOXTRADES CONFIGURATION - FIXED VERSION
    // ============================================
    
    const Veloxtrades = {
        API_BASE_URL: 'https://investment-gto3.onrender.com',
        VERSION: '2.1.8',
        MAX_LOGIN_ATTEMPTS: 5,
        LOCKOUT_DURATION: 15 * 60 * 1000, // 15 minutes
        loginAttempts: 0,
        lockoutUntil: null,

        // Check if user is locked out
        isLockedOut: function() {
            if (this.lockoutUntil && Date.now() < this.lockoutUntil) {
                const remainingMinutes = Math.ceil((this.lockoutUntil - Date.now()) / 60000);
                return { locked: true, remainingMinutes };
            }
            return { locked: false };
        },

        // Get token with proper validation
        getToken: function() {
            // Check if token exists and is valid
            const token = localStorage.getItem('veloxtrades_token') || sessionStorage.getItem('veloxtrades_token');
            if (token) {
                // Basic token validation - check if it's expired
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp && payload.exp * 1000 < Date.now()) {
                        console.log('⚠️ Token expired');
                        this.clearToken();
                        return null;
                    }
                } catch (e) {
                    console.log('⚠️ Invalid token format');
                }
                return token;
            }
            return null;
        },

        // Save token based on remember me preference
        setToken: function(token, rememberMe = false) {
            if (rememberMe) {
                localStorage.setItem('veloxtrades_token', token);
                sessionStorage.removeItem('veloxtrades_token');
            } else {
                sessionStorage.setItem('veloxtrades_token', token);
                localStorage.removeItem('veloxtrades_token');
            }
            console.log('✅ Token saved (remember me:', rememberMe, ')');
        },

        // Clear all session data
        clearToken: function() {
            localStorage.removeItem('veloxtrades_token');
            localStorage.removeItem('veloxtrades_user');
            localStorage.removeItem('rememberMe');
            sessionStorage.removeItem('veloxtrades_token');
            sessionStorage.removeItem('veloxtrades_user');
            sessionStorage.removeItem('loginRedirect');
            console.log('🗑️ All session data cleared');
        },

        // Check if user is already logged in - FIXED REDIRECT LOOP
        checkAuth: function() {
            const token = this.getToken();
            if (token) {
                const userData = localStorage.getItem('veloxtrades_user') || sessionStorage.getItem('veloxtrades_user');
                if (userData) {
                    try {
                        const user = JSON.parse(userData);
                        const isAdmin = user && (user.is_admin === true || user.role === 'admin');
                        
                        // Check current page to avoid redirect loop
                        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                        const targetPage = isAdmin ? 'admin-dashboard.html' : 'dashboard.html';
                        
                        // Only redirect if not already on target page
                        if (currentPage !== targetPage && currentPage !== 'login.html') {
                            console.log('🔄 Already logged in, redirecting to:', targetPage);
                            window.location.replace(targetPage);
                            return true;
                        }
                    } catch (e) {
                        console.error('Error parsing user data:', e);
                    }
                }
            }
            return false;
        },

        // Login with timeout and better error handling
        async login(username, password, rememberMe = false) {
            // Check lockout
            const lockout = this.isLockedOut();
            if (lockout.locked) {
                throw new Error(`Too many failed attempts. Please wait ${lockout.remainingMinutes} minutes.`);
            }

            try {
                console.log('🔐 Attempting login for:', username);
                
                // Create abort controller for timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); // 30 second timeout
                
                const response = await fetch(`${this.API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                    mode: 'cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                console.log(`📡 Login response status: ${response.status}`);
                
                // Check content type
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Server returned invalid response format');
                }
                
                const data = await response.json();
                console.log('📦 Login response:', data);
                
                if (!response.ok) {
                    // Increment failed attempts
                    this.loginAttempts++;
                    if (this.loginAttempts >= this.MAX_LOGIN_ATTEMPTS) {
                        this.lockoutUntil = Date.now() + this.LOCKOUT_DURATION;
                        // Reset attempts after lockout
                        setTimeout(() => {
                            this.loginAttempts = 0;
                            this.lockoutUntil = null;
                        }, this.LOCKOUT_DURATION);
                    }
                    throw new Error(data.message || 'Login failed');
                }
                
                // Reset login attempts on success
                this.loginAttempts = 0;
                this.lockoutUntil = null;
                
                if (data.success && data.data?.token) {
                    this.setToken(data.data.token, rememberMe);
                    if (data.data.user) {
                        const userData = JSON.stringify(data.data.user);
                        if (rememberMe) {
                            localStorage.setItem('veloxtrades_user', userData);
                            localStorage.setItem('rememberMe', 'true');
                        } else {
                            sessionStorage.setItem('veloxtrades_user', userData);
                        }
                    }
                    return { success: true, data: data.data };
                }
                
                if (data.token) {
                    this.setToken(data.token, rememberMe);
                    if (data.user) {
                        const userData = JSON.stringify(data.user);
                        if (rememberMe) {
                            localStorage.setItem('veloxtrades_user', userData);
                            localStorage.setItem('rememberMe', 'true');
                        } else {
                            sessionStorage.setItem('veloxtrades_user', userData);
                        }
                    }
                    return { success: true, data: { token: data.token, user: data.user } };
                }
                
                return { success: false, message: data.message || 'Login failed' };
                
            } catch (error) {
                console.error('❌ Login error:', error.message);
                
                if (error.name === 'AbortError') {
                    throw new Error('Request timeout. Please check your connection and try again.');
                }
                
                if (error.message.includes('fetch') || error.message.includes('network')) {
                    throw new Error('Network error. Please check your internet connection.');
                }
                
                throw error;
            }
        },

        // Test connection with timeout
        async testConnection() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${this.API_BASE_URL}/health`, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                console.log('✅ Backend connected:', data);
                return true;
            } catch (error) {
                console.log('⚠️ Backend connection:', error.message);
                return false;
            }
        }
    };

    window.Veloxtrades = Veloxtrades;

    // ============================================
    // LOGIN PAGE CODE - FIXED VERSION
    // ============================================
    
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const clearSessionBtn = document.getElementById('clearSessionBtn');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const homeLink = document.getElementById('homeLink');
        
        console.log('📄 Login page loaded - Version 2.1.8');
        console.log('🔧 Backend API URL:', Veloxtrades.API_BASE_URL);
        
        // Check if already logged in - FIXED to prevent redirect loop
        Veloxtrades.checkAuth();
        
        // Load saved username if remember me was checked
        const savedUsername = localStorage.getItem('saved_username');
        const savedRememberMe = localStorage.getItem('rememberMe');
        if (savedUsername && savedRememberMe === 'true') {
            usernameInput.value = savedUsername;
            rememberMeCheckbox.checked = true;
        }
        
        function showMessage(text, type = 'error') {
            messageDiv.className = `message ${type}`;
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle',
                warning: 'fa-exclamation-triangle'
            };
            const icon = icons[type] || 'fa-info-circle';
            messageDiv.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            messageDiv.style.display = 'block';
            
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    if (messageDiv.style.display === 'block') {
                        messageDiv.style.display = 'none';
                    }
                }, 5000);
            }
        }
        
        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            usernameInput.disabled = isLoading;
            passwordInput.disabled = isLoading;
            rememberMeCheckbox.disabled = isLoading;
            
            if (isLoading) {
                loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            } else {
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }
        
        // Input validation
        function validateInputs(username, password) {
            if (!username || username.length < 3) {
                return 'Username must be at least 3 characters long';
            }
            if (!password || password.length < 6) {
                return 'Password must be at least 6 characters long';
            }
            // Check for potentially harmful characters
            if (/[<>'"]/.test(username)) {
                return 'Username contains invalid characters';
            }
            return null;
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const rememberMe = rememberMeCheckbox.checked;
            
            // Validate inputs
            const validationError = validateInputs(username, password);
            if (validationError) {
                showMessage(validationError, 'error');
                return;
            }
            
            setLoading(true);
            showMessage('Authenticating...', 'info');
            
            try {
                const result = await Veloxtrades.login(username, password, rememberMe);
                
                if (result.success && result.data) {
                    const user = result.data.user;
                    const isAdmin = user && (user.is_admin === true || user.role === 'admin');
                    
                    // Save username if remember me is checked
                    if (rememberMe) {
                        localStorage.setItem('saved_username', username);
                    } else {
                        localStorage.removeItem('saved_username');
                    }
                    
                    showMessage('Login successful! Redirecting...', 'success');
                    console.log('✅ Login successful! User type:', isAdmin ? 'ADMIN' : 'USER');
                    
                    // Clear any redirect flags
                    sessionStorage.removeItem('loginRedirect');
                    
                    // Small delay to show success message
                    setTimeout(() => {
                        const targetPage = isAdmin ? 'admin-dashboard.html' : 'dashboard.html';
                        console.log('🚀 Redirecting to:', targetPage);
                        window.location.replace(targetPage);
                    }, 800);
                } else {
                    const errorMsg = result.message || 'Invalid username or password';
                    showMessage(errorMsg, 'error');
                    setLoading(false);
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message || 'Connection error. Please try again.', 'error');
                setLoading(false);
                passwordInput.value = '';
            }
        }
        
        function clearSession() {
            if (confirm('Are you sure you want to clear all saved session data? You will need to login again.')) {
                Veloxtrades.clearToken();
                localStorage.removeItem('saved_username');
                showMessage('Session cleared successfully!', 'success');
                usernameInput.value = '';
                passwordInput.value = '';
                rememberMeCheckbox.checked = false;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
        
        // Handle home link - clear session before going to index
        function handleHomeLink(e) {
            e.preventDefault();
            // Clear any pending redirects
            sessionStorage.removeItem('loginRedirect');
            // Navigate to home
            window.location.href = 'index.html';
        }
        
        // Event listeners
        loginForm.addEventListener('submit', handleLogin);
        
        if (homeLink) {
            homeLink.addEventListener('click', handleHomeLink);
        }
        
        passwordInput.addEventListener('keypress', function(e) { 
            if (e.key === 'Enter' && !loginBtn.disabled) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        if (clearSessionBtn) {
            clearSessionBtn.addEventListener('click', clearSession);
        }
        
        // Test connection on load (non-blocking)
        Veloxtrades.testConnection().catch(() => {});
        
        // Focus on username field
        if (!usernameInput.value) {
            usernameInput.focus();
        } else {
            passwordInput.focus();
        }
    });
    </script>
</body>
</html>
