<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; color: #10b981; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; }
        button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover:not(:disabled) { background: #059669; }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .demo-note {
            margin-top: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .forgot-password {
            text-align: right;
            margin-top: 5px;
            font-size: 14px;
        }
        .forgot-password a {
            color: #6b7280;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: #10b981;
        }
        .back-link {
            margin-top: 15px;
            text-align: center;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            color: #10b981;
        }
    </style>
</head>
<body data-page="login">
    <div class="container">
        <h1>Welcome Back to Veloxtrades</h1>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" placeholder="Enter your username or email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                <div class="forgot-password">
                    <a href="#" data-nav="forgot-password">Forgot password?</a>
                </div>
            </div>

            <button type="submit" id="loginBtn">Login</button>
        </form>

        <div class="link">
            Don't have an account? <a href="#" data-nav="register">Register here</a>
        </div>




        <div class="back-link">
            <a href="#" data-nav="home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Check if already logged in - redirect to dashboard
        if (Veloxtrades.isAuthenticated()) {
            Veloxtrades.navigateTo('dashboard');
            return;
        }

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Check for registration success message
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            showMessage('Registration successful! Please login.', 'success');
        }

        function showMessage(text, type = 'info') {
            messageDiv.style.display = 'block';
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;

            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            if (isLoading) {
                loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            } else {
                loginBtn.innerHTML = 'Login';
            }
        }

        function validateInputs() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username) {
                showMessage('Please enter your username or email', 'warning');
                usernameInput.focus();
                return false;
            }

            if (!password) {
                showMessage('Please enter your password', 'warning');
                passwordInput.focus();
                return false;
            }

            return true;
        }

        async function handleLogin(e) {
            e.preventDefault();

            if (!validateInputs()) {
                return;
            }

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            setLoading(true);
            showMessage('Authenticating...', 'info');

            try {
                const result = await Veloxtrades.login(username, password);

                console.log('Login response:', result);

                if (result.success && result.data?.token) {
                    showMessage('✅ Login successful! Redirecting...', 'success');

                    // Redirect based on user role
                    setTimeout(() => {
                        if (result.data.user?.is_admin) {
                            window.location.href = '/admin-dashboard.html';
                        } else {
                            Veloxtrades.navigateTo('dashboard');
                        }
                    }, 1500);
                } else {
                    showMessage(result.message || 'Login failed. Please check your credentials.', 'error');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message || 'Error connecting to server', 'error');
                setLoading(false);
            }
        }

        // Event Listeners
        loginForm.addEventListener('submit', handleLogin);

        // Input validation styling
        usernameInput.addEventListener('blur', function() {
            this.style.borderColor = this.value.trim() ? '#10b981' : '#e5e7eb';
        });

        passwordInput.addEventListener('blur', function() {
            this.style.borderColor = this.value.trim().length >= 6 ? '#10b981' :
                                    (this.value.trim() ? '#f97316' : '#e5e7eb');
        });

        // Test backend connection
        Veloxtrades.testConnection();
    });
    </script>
</body>
</html>
