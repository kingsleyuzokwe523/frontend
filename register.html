<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Veloxtrades</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/tnnJPyX.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #10b981, #34d399);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; color: #10b981; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #10b981; }
        button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover:not(:disabled) { background: #059669; }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .info { background: #e6f3ff; color: #0066cc; border: 1px solid #3b82f6; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #10b981; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .back-link {
            margin-top: 15px;
            text-align: center;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            color: #10b981;
        }
    </style>
</head>
<body data-page="register">
    <div class="container">
        <h1>Join Veloxtrades</h1>

        <div id="message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Choose a password (min. 6 characters)" required minlength="6">
                <div id="passwordStrength" class="password-strength"></div>
            </div>

            <button type="submit" id="registerBtn">Register</button>
        </form>

        <div class="link">
            Already have an account? <a href="login.html">Login here</a>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
    // ============================================
    // VELOXTRADES CONFIGURATION - EMBEDDED
    // ============================================
    
    const Veloxtrades = {
        API_BASE_URL: 'https://investment-gto3.onrender.com',
        VERSION: '2.1.5',

        isAuthenticated: function() {
            return !!this.getToken();
        },

        getToken: function() {
            const cookieMatch = document.cookie.match(/veloxtrades_token=([^;]+)/);
            if (cookieMatch) return cookieMatch[1];
            return localStorage.getItem('veloxtrades_token') || sessionStorage.getItem('veloxtrades_token');
        },

        setToken: function(token) {
            const maxAge = 30 * 24 * 60 * 60;
            document.cookie = `veloxtrades_token=${token}; path=/; max-age=${maxAge}; secure; samesite=Lax`;
            localStorage.setItem('veloxtrades_token', token);
            sessionStorage.setItem('veloxtrades_token', token);
            this.updateNavigation();
        },

        clearToken: function() {
            document.cookie = 'veloxtrades_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            localStorage.removeItem('veloxtrades_token');
            localStorage.removeItem('veloxtrades_user');
            sessionStorage.removeItem('veloxtrades_token');
            sessionStorage.removeItem('veloxtrades_user');
        },

        logout: function() {
            fetch(`${this.API_BASE_URL}/api/logout`, { method: 'POST', credentials: 'include' }).catch(() => {});
            this.clearToken();
            window.location.href = '/';
        },

        async request(endpoint, options = {}) {
            const url = `${this.API_BASE_URL}${endpoint}`;
            const token = this.getToken();
            const headers = {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                ...options.headers
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            try {
                const response = await fetch(url, {
                    ...options,
                    headers,
                    credentials: 'include',
                    mode: 'cors'
                });
                
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    if (!response.ok) {
                        if (response.status === 401) {
                            this.logout();
                            throw new Error('Session expired. Please login again.');
                        }
                        throw new Error(data.message || data.error || 'API request failed');
                    }
                    return data;
                } else {
                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }
                    return { success: true };
                }
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        },

        async register(userData) {
            return this.request('/api/register', {
                method: 'POST',
                body: JSON.stringify(userData)
            });
        },

        checkPasswordStrength: function(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
            return { score: strength, text: texts[strength] };
        },

        async testConnection() {
            try {
                const response = await fetch(`${this.API_BASE_URL}/health`, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                const data = await response.json();
                console.log('✅ Backend connection successful:', data);
                return true;
            } catch (error) {
                console.log('Backend connection check:', error.message);
                return false;
            }
        }
    };

    window.Veloxtrades = Veloxtrades;

    // ============================================
    // REGISTER PAGE CODE
    // ============================================
    
    document.addEventListener('DOMContentLoaded', function() {
        // Check if already logged in - redirect to dashboard
        if (Veloxtrades.isAuthenticated()) {
            window.location.href = 'dashboard.html';
            return;
        }

        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');

        // Password strength checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strength = Veloxtrades.checkPasswordStrength(password);
            strengthDiv.textContent = strength.text;
            strengthDiv.style.backgroundColor = '#e8f5e9';
            strengthDiv.style.color = '#2e7d32';
            strengthDiv.style.border = '1px solid #2e7d32';
        });

        function showMessage(text, type = 'info') {
            messageDiv.style.display = 'block';
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
        }

        function setLoading(isLoading) {
            registerBtn.disabled = isLoading;
            if (isLoading) {
                registerBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            } else {
                registerBtn.innerHTML = 'Register';
            }
        }

        function validateInputs() {
            const fullName = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value.trim();

            if (!fullName) {
                showMessage('Please enter your full name', 'warning');
                document.getElementById('full_name').focus();
                return false;
            }

            if (!email) {
                showMessage('Please enter your email', 'warning');
                document.getElementById('email').focus();
                return false;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address', 'warning');
                document.getElementById('email').focus();
                return false;
            }

            if (!username) {
                showMessage('Please choose a username', 'warning');
                document.getElementById('username').focus();
                return false;
            }

            if (username.length < 3) {
                showMessage('Username must be at least 3 characters', 'warning');
                document.getElementById('username').focus();
                return false;
            }

            if (!password) {
                showMessage('Please enter a password', 'warning');
                passwordInput.focus();
                return false;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'warning');
                passwordInput.focus();
                return false;
            }

            return true;
        }

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateInputs()) {
                return;
            }

            const formData = {
                full_name: document.getElementById('full_name').value.trim(),
                email: document.getElementById('email').value.trim().toLowerCase(),
                username: document.getElementById('username').value.trim().toLowerCase(),
                password: passwordInput.value.trim()
            };

            setLoading(true);
            showMessage('Creating your account...', 'info');

            try {
                const result = await Veloxtrades.register(formData);
                
                console.log('Registration response:', result);
                
                if (result.success) {
                    showMessage('✅ Registration successful! Redirecting to login...', 'success');
                    
                    registerForm.reset();
                    
                    setTimeout(() => {
                        window.location.href = 'login.html?registered=true';
                    }, 2000);
                } else {
                    showMessage(result.message || 'Registration failed', 'error');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage(error.message || 'Error connecting to server', 'error');
                setLoading(false);
            }
        });

        // Test backend connection
        Veloxtrades.testConnection();
    });
    </script>
</body>
</html>
